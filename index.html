    <!-- Style global, polices et animations -->
    <style>
        /* Déclaration de la police Heroeau Elegant (Fallback sur serif élégant si fichier local absent) */
        @font-face {
            font-family: 'Heroeau Elegant';
            src: url('/fonts/Heroeau-Elegant.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; /* Aucun défilement global */
            background-color: #000008; /* Fond de base strict quasi noir pur */
            color: white;
            user-select: none;
        }

        /* Style Liquid Glass (verre dépoli type iOS) */
        .liquid-glass {
            background: var(--glass, rgba(255, 255, 255, 0.08));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .liquid-glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 9999px; /* Pill shape */
            color: white;
            transition: background 0ms, color 0ms, box-shadow 150ms ease, opacity 300ms ease;
            cursor: pointer;
        }
        .liquid-glass-btn:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* Animation de remplissage du texte (Page de chargement) */
        .text-fill-anim {
            background: linear-gradient(to right, #ffffff 50%, rgba(255,255,255,0.1) 50%);
            background-size: 200% 100%;
            background-position: 100% 0;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fillText 3s ease-in-out forwards;
        }
        @keyframes fillText {
            0% { background-position: 100% 0; }
            100% { background-position: 0% 0; }
        }

        /* Transitions React (Fade in/out doux) */
        .fade-enter { opacity: 0; }
        .fade-enter-active { opacity: 1; transition: opacity 1s ease; }
        .fade-exit { opacity: 1; }
        .fade-exit-active { opacity: 0; transition: opacity 1s ease; }

        // Composant d'Arrière-plan Canvas avec 1200 étoiles strictes
        const GalaxyBackground = () => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d', { alpha: false });
                let animationFrameId;
                
                const setSize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };
                setSize();
                window.addEventListener('resize', setSize);

                const stars = [];
                for (let i = 0; i < 1200; i++) {
                    let r, baseOpacity;
                    const rand = Math.random();
                    
                    // Distribution stricte selon les règles demandées
                    if (rand < 0.70) {
                        // 70% : rayon 0.2 - 0.4 (diamètre 0.4 - 0.8)
                        r = 0.2 + Math.random() * 0.2; 
                        // opacity 0.4 à 0.7
                        baseOpacity = 0.4 + Math.random() * 0.3;
                    } else if (rand < 0.95) {
                        // 25% : rayon 0.4 - 0.7 (diamètre 0.8 - 1.4)
                        r = 0.4 + Math.random() * 0.3;
                        // opacity 0.6 à 0.9
                        baseOpacity = 0.6 + Math.random() * 0.3;
                    } else {
                        // 5% : rayon 0.7 - 1.0 (diamètre 1.4 - 2.0)
                        r = 0.7 + Math.random() * 0.3;
                        // opacity 0.8 à 1.0
                        baseOpacity = 0.8 + Math.random() * 0.2;
                    }
                    
                    // Couleurs : 80% blanc pur, 20% très légèrement bleuté
                    const color = Math.random() < 0.2 ? '232, 240, 255' : '255, 255, 255';
                    
                    // 15% des étoiles ont une animation de scintillement subtile
                    const isTwinkling = Math.random() < 0.15;
                    // Vitesse pour un cycle aléatoire de 3s à 6s (vitesse = 2*PI / temps_ms)
                    const twinkleSpeed = 0.00104 + Math.random() * (0.00209 - 0.00104);
                    const twinklePhase = Math.random() * Math.PI * 2;

                    stars.push({
                        x: Math.random() * window.innerWidth,
                        y: Math.random() * window.innerHeight,
                        r, baseOpacity, color, isTwinkling, twinkleSpeed, twinklePhase
                    });
                }

                const render = (time) => {
                    // Fond quasi pur et sans halos (#000008)
                    ctx.fillStyle = '#000008';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    stars.forEach(s => {
                        let opacity = s.baseOpacity;
                        if (s.isTwinkling) {
                            // Sinusoïde entre -1 et 1 ajustée pour osciller entre 0.3 et 1.0
                            // Centre de l'oscillation = 0.65, amplitude = 0.35
                            const sine = Math.sin(time * s.twinkleSpeed + s.twinklePhase);
                            opacity = 0.65 + (sine * 0.35);
                        }
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${s.color}, ${opacity})`;
                        ctx.fill();
                    });

                    animationFrameId = requestAnimationFrame(render);
                };
                animationFrameId = requestAnimationFrame(render);

                return () => {
                    window.removeEventListener('resize', setSize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            return <canvas ref={canvasRef} style={{position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', zIndex: -10}} />;

        const GlobeView = ({ onSelectContinent }) => {
            const mountRef = useRef(null);
            const [globeLoaded, setGlobeLoaded] = useState(false);
            const [showButtons, setShowButtons] = useState(false);
            const [hoveredCont, setHoveredCont] = useState(null);

            useEffect(() => {
                if (globeLoaded) {
                    const timer = setTimeout(() => {
                        setShowButtons(true);
                    }, 2700); // 2500ms (animation du globe) + 200ms de pause naturelle
                    return () => clearTimeout(timer);
                }
            }, [globeLoaded]);
            
            useEffect(() => {
                // Setup Three.js
                const w = window.innerWidth;
                const h = window.innerHeight;
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 1000);
                camera.position.z = 25; // Zoom depuis le lointain

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(w, h);
                mountRef.current.appendChild(renderer.domElement);

                const textureLoader = new THREE.TextureLoader();
                
                // Shader Material for Day/Night blending
                const earthUniforms = {
                    dayTexture: { value: null },
                    nightTexture: { value: null },
                    sunDirection: { value: new THREE.Vector3(5, 3, 5).normalize() },
                    globalOpacity: { value: 0.0 }
                };

                const earthVS = `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `;

                const earthFS = `
                    uniform sampler2D dayTexture;
                    uniform sampler2D nightTexture;
                    uniform vec3 sunDirection;
                    uniform float globalOpacity;
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    void main() {
                        vec3 dayColor = texture2D(dayTexture, vUv).rgb;
                        vec3 nightColor = texture2D(nightTexture, vUv).rgb;
                        float intensity = dot(vNormal, sunDirection);
                        float blend = smoothstep(-0.2, 0.2, intensity);
                        vec3 finalColor = mix(nightColor, dayColor, blend);
                        gl_FragColor = vec4(finalColor, globalOpacity);
                    }
                `;

                const geometry = new THREE.SphereGeometry(5, 64, 64);
                const material = new THREE.ShaderMaterial({
                    uniforms: earthUniforms,
                    vertexShader: earthVS,
                    fragmentShader: earthFS,
                    transparent: true
                });
                const earth = new THREE.Mesh(geometry, material);
                earth.scale.setScalar(0.001); // Évite le flash noir initial
                scene.add(earth);

                // Lumières additionnelles pour les calculs internes
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
                scene.add(ambientLight);
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
                dirLight.position.set(5, 3, 5);
                scene.add(dirLight);

                // Texture Loading avec Preload
                let isLoaded = false;
                let loadedCount = 0;
                const checkLoad = () => {
                    loadedCount++;
                    if(loadedCount === 2) {
                        isLoaded = true;
                        setGlobeLoaded(true);
                    }
                };

                textureLoader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', (tex) => {
                    earthUniforms.dayTexture.value = tex;
                    checkLoad();
                });
                textureLoader.load('https://unpkg.com/three-globe/example/img/earth-night.jpg', (tex) => {
                    earthUniforms.nightTexture.value = tex;
                    checkLoad();
                });

                // Animation & Interactions
                let isDragging = false;
                let previousMousePosition = { x: 0, y: 0 };
                let targetRotation = { x: 0, y: 0 };
                let targetPositionX = 0; // Pour décaler la Terre

                let startTime = null;
                const duration = 2500; // Ralenti à 2.5 secondes

                const animate = (time) => {
                    requestAnimationFrame(animate);

                    if (isLoaded) {
                        // Intro zoom ne démarre qu'une fois les textures chargées
                        if (!startTime) startTime = time;
                        const elapsed = time - startTime;

                        if (elapsed < duration) {
                            const progress = elapsed / duration;
                            // approximation cubic-bezier(0.16, 1, 0.3, 1) très douce
                            const ease = 1 - Math.pow(1 - progress, 4); 
                            
                            camera.position.z = 25 - (15 * ease); // Ease out, finit à z=10
                            earth.scale.setScalar(0.001 + ease * 0.999);
                            earthUniforms.globalOpacity.value = ease;
                        } else {
                            earth.scale.setScalar(1);
                            earthUniforms.globalOpacity.value = 1.0;
                            camera.position.z = 10;
                        }

                        // Rotation auto + inertie
                        if (!isDragging) {
                            targetRotation.y += 0.001;
                        }
                        earth.rotation.y += (targetRotation.y - earth.rotation.y) * 0.1;
                        earth.rotation.x += (targetRotation.x - earth.rotation.x) * 0.1;

                        // Décalage position X (pour laisser place au panneau)
                        earth.position.x += (targetPositionX - earth.position.x) * 0.05;
                    }

                    renderer.render(scene, camera);
                };
                requestAnimationFrame(animate);

                // Events
                const onMouseDown = (e) => { isDragging = true; previousMousePosition = { x: e.offsetX, y: e.offsetY }; };
                const onMouseMove = (e) => {
                    if (isDragging) {
                        const deltaMove = { x: e.offsetX - previousMousePosition.x, y: e.offsetY - previousMousePosition.y };
                        targetRotation.y += deltaMove.x * 0.005;
                        targetRotation.x += deltaMove.y * 0.005;
                        // Limiter la rotation X (Pôles)
                        targetRotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, targetRotation.x));
                        previousMousePosition = { x: e.offsetX, y: e.offsetY };
                    }
                };
                const onMouseUp = () => { isDragging = false; };
                const onWheel = (e) => {
                    targetRotation.y += e.deltaY * 0.002;
                };

                renderer.domElement.addEventListener('mousedown', onMouseDown);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
                renderer.domElement.addEventListener('wheel', onWheel);

                // Exposer la fonction pour décaler la Terre depuis le composant parent
                window.shiftEarth = (shiftLeft) => {
                    targetPositionX = shiftLeft ? -3 : 0;
                };

                // Resize
                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                    if(mountRef.current) mountRef.current.removeChild(renderer.domElement);
                    delete window.shiftEarth;
                };
            }, []);

            return (
                <div className="absolute inset-0 z-0">
                    <div ref={mountRef} className="w-full h-full cursor-grab active:cursor-grabbing"></div>
                    
                    {/* UI Flottante pour la sélection de continents, plus fiable que le raycasting pur en 1 fichier */}
                    <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-wrap justify-center gap-4 w-full max-w-2xl pointer-events-none z-10 px-4 mt-48">

                                    if(window.shiftEarth) window.shiftEarth(true);
                                    onSelectContinent(cont);
                                }}
                                className={`liquid-glass-btn px-6 py-2 text-sm font-semibold tracking-wider capitalize ${showButtons ? 'pointer-events-auto' : 'pointer-events-none'} ${hoveredCont === cont.id ? 'bg-white text-[#4A7197]' : ''}`}

                                    opacity: showButtons ? 1 : 0, 
                                    transition: `opacity 300ms ease ${showButtons ? index * 100 : 0}ms, box-shadow 150ms ease` 
                                }}
                            >
                                {cont.name}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const CountryPanel = ({ continent, onSelectCountry, onClose }) => {

            return (

        const GamesSection = ({ country, onBack }) => {
            const [activeGame, setActiveGame] = useState(null);
            const [isClosing, setIsClosing] = useState(false);

            // STATE Game 1: Dilemma
            const currentDilemmas = COUNTRY_DILEMMAS[country.name] || COUNTRY_DILEMMAS['Générique'];
            const [g1ScenarioIndex, setG1ScenarioIndex] = useState(0);
            const [g1Feedback, setG1Feedback] = useState(null);
            const [g1SelectedOpt, setG1SelectedOpt] = useState(null);

            const nextDilemma = () => {
                let next;
                if (currentDilemmas.length > 1) {
                    do { next = Math.floor(Math.random() * currentDilemmas.length); } 
                    while (next === g1ScenarioIndex);
                } else {
                    next = 0;
                }
                setG1ScenarioIndex(next);
                setG1Feedback(null);
                setG1SelectedOpt(null);
            };

            // STATE Game 2: Detective
            const currentDetectives = COUNTRY_DETECTIVES[country.name] || COUNTRY_DETECTIVES['Générique'];
            const [g2SeriesIndex, setG2SeriesIndex] = useState(0);
            const [g2Revealed, setG2Revealed] = useState(1);
            const [g2Feedback, setG2Feedback] = useState(null);
            const [g2Score, setG2Score] = useState(0);

            const nextDetective = () => {
                let next;
                if (currentDetectives.length > 1) {
                    do { next = Math.floor(Math.random() * currentDetectives.length); } 
                    while (next === g2SeriesIndex);
                } else {
                    next = 0;
                }
                setG2SeriesIndex(next);
                setG2Revealed(1);
                setG2Feedback(null);
            };

            const handleG2Guess = () => {
                const points = [0, 4, 3, 2, 1][g2Revealed] || 1;
                setG2Score(prev => prev + points);
                setG2Feedback({ points });
            };

            // STATE Game 3: Mystery Object
            const currentObjects = COUNTRY_OBJECTS[country.name] || COUNTRY_OBJECTS['Générique'];
            const [g3ObjIndex, setG3ObjIndex] = useState(0);
            const [g3HintIndex, setG3HintIndex] = useState(-1);
            const [g3AnswerRevealed, setG3AnswerRevealed] = useState(false);
            
            const currentObj = currentObjects[g3ObjIndex];
            const currentHints = currentObj.hints;

            // Setup Hint Timer
            useEffect(() => {
                if (activeGame !== 3) return;
                setG3HintIndex(-1);
                setG3AnswerRevealed(false);
                let timer = setTimeout(() => setG3HintIndex(0), 15000); // Premier indice après 15s
                return () => clearTimeout(timer);
            }, [activeGame, country, g3ObjIndex]);

            useEffect(() => {
                if (activeGame === 3 && g3HintIndex >= 0 && g3HintIndex < currentHints.length - 1 && !g3AnswerRevealed) {
                    let timer = setTimeout(() => setG3HintIndex(prev => prev + 1), 15000);
                    return () => clearTimeout(timer);
                }
            }, [g3HintIndex, currentHints.length, activeGame, g3AnswerRevealed]);

            const nextObject = () => {
                setG3ObjIndex(prev => (prev + 1) % currentObjects.length);
            };

            const renderGameContent = () => {
                if(activeGame === 1) {
                    const d = currentDilemmas[g1ScenarioIndex];
                    return (
                        <div className="flex flex-col h-full animate-[fadeIn_0.3s_ease]">
                            <h3 className="font-title text-3xl mb-6 text-[#4A7197]">Le Dilemme du Voyageur</h3>
                            <p className="text-xl mb-8 leading-relaxed">{d.q}</p>
                            {!g1Feedback ? (
                                <div className="space-y-4">
                                    {d.opts.map((opt, i) => (
                                        <button 
                                            key={i} 
                                            onClick={() => { 
                                                setG1SelectedOpt(i); 
                                                setG1Feedback(i === d.ans ? 'success' : 'error'); 
                                            }} 
                                            className="w-full text-left liquid-glass p-4 hover:bg-white/10 transition"
                                        >
                                            {opt}
                                        </button>
                                    ))}
                                </div>
                            ) : (
                                <div className="flex flex-col flex-grow">
                                    <div className="space-y-4 mb-6">
                                        {d.opts.map((opt, i) => {
                                            let btnClass = "w-full text-left liquid-glass p-4 transition ";
                                            if (i === d.ans) {
                                                btnClass += "bg-green-500/20 border-green-500 text-green-300";
                                            } else if (i === g1SelectedOpt) {
                                                btnClass += "bg-red-500/20 border-red-500 text-red-300";
                                            } else {
                                                btnClass += "opacity-50";
                                            }
                                            return (
                                                <button key={i} disabled className={btnClass}>
                                                    {i === d.ans ? "✓ " : (i === g1SelectedOpt ? "✗ " : "")}{opt}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    <div className="liquid-glass p-6 border-[#4A7197] bg-[#4A7197]/10 mt-auto">
                                        <h4 className="font-bold text-lg mb-2 flex items-center gap-2">
                                            DisBot 
                                            {g1Feedback === 'success' ? <span className="text-green-400">✓ Excellent choix</span> : <span className="text-red-400">✗ Attention au faux pas</span>}
                                        </h4>
                                        <p className="text-gray-200">{d.exp}</p>
                                        <button onClick={nextDilemma} className="mt-4 px-6 py-2 bg-white/20 rounded-full hover:bg-white/30 transition text-sm font-bold">Nouveau scénario</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                }
                if(activeGame === 2) {
                    const d = currentDetectives[g2SeriesIndex];
                    return (
                        <div className="flex flex-col h-full animate-[fadeIn_0.3s_ease]">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-title text-3xl text-[#4A7197]">Le Détective Culturel</h3>
                                <div className="font-bold bg-white/10 px-4 py-2 rounded-full mr-[60px]">Score: {g2Score} pts</div>
                            </div>
                            <div className="space-y-4 mb-8">
                                {d.clues.map((clue, i) => (
                                    <div key={i} className={`p-4 liquid-glass transition-opacity duration-500 ${i < g2Revealed ? 'opacity-100' : 'opacity-0 hidden'}`}>
                                        Indice {i+1} : {clue}
                                    </div>
                                ))}
                            </div>
                            {!g2Feedback ? (
                                <div className="mt-auto space-y-4">
                                    {g2Revealed < d.clues.length && <button onClick={() => setG2Revealed(prev => prev+1)} className="liquid-glass-btn px-6 py-2 w-full">Révéler l'indice suivant (-1 pt potentiel)</button>}
                                    <button onClick={handleG2Guess} className="bg-[#4A7197] text-white font-bold px-6 py-3 rounded-full w-full hover:bg-[#4A7197]/80 transition">Je sais ! Voir la réponse</button>
                                </div>
                            ) : (
                                <div className="liquid-glass p-6 mt-auto">
                                    <h4 className="font-bold text-2xl text-[#4A7197] mb-2">{d.ans} <span className="text-sm font-normal text-white">({g2Feedback.points} pts gagnés)</span></h4>
                                    <p className="text-gray-200">{d.exp}</p>
                                    <button onClick={nextDetective} className="mt-4 px-6 py-2 bg-white/20 rounded-full hover:bg-white/30 transition text-sm font-bold">Nouveau Scénario</button>
                                </div>
                            )}
                        </div>
                    );
                }
                if(activeGame === 3) {
                    return (
                        <div className="flex flex-col h-full animate-[fadeIn_0.3s_ease] relative">
                            {/* En-tête : hauteur fixe 60px */}
                            <div className="flex justify-between items-center h-[60px] shrink-0 mb-4">
                                <div>
                                    <h3 className="font-title text-3xl text-[#4A7197] leading-none mb-1">L'Objet Mystère</h3>
                                    <p className="text-sm text-gray-400">Manipulez l'objet 3D pour deviner sa fonction.</p>
                                </div>
                                <span className="font-bold bg-white/10 px-4 py-1 rounded-full text-sm mr-[50px] shrink-0">
                                    Objet {g3ObjIndex + 1} / {currentObjects.length}
                                </span>
                            </div>
                            
                            {/* Zone iframe Sketchfab : hauteur fixe 350px */}
                            <div className="w-full h-[350px] bg-black/20 rounded-xl overflow-hidden mb-4 relative shrink-0">
                                {/* Bandeau de masquage absolu pour cacher le titre Sketchfab */}
                                <div className="absolute top-0 left-0 w-full h-[55px] bg-[#000008] z-10 rounded-t-xl"></div>
                                <iframe 
                                    title="Mystery Object"
                                    frameBorder="0" 
                                    allowFullScreen 
                                    width="100%" 
                                    height="350px" 
                                    src={`${currentObj.src}&transparent=1`}
                                    className="absolute inset-0 w-full h-full"
                                ></iframe>
                            </div>
                            
                            {/* Zone DisBot : hauteur dynamique */}
                            <div className="liquid-glass p-4 text-sm text-gray-300 min-h-[80px] max-h-[150px] overflow-y-auto shrink-0">
                                <strong>DisBot : </strong> 
                                {!g3AnswerRevealed ? (
                                    g3HintIndex >= 0 ? currentHints.slice(0, g3HintIndex + 1).map((h, i) => <span key={i} className="block mt-1 animate-[fadeIn_0.5s_ease]">- {h}</span>) : 
                                    <span className="text-gray-500 italic">J'observe... Des indices apparaîtront si vous bloquez.</span>
                                ) : (
                                    <span className="block mt-1 text-green-400 font-bold text-base animate-[fadeIn_0.5s_ease]">{currentObj.ans}</span>
                                )}
                            </div>

                            {/* Zone bouton d'action : en dessous, aligné à droite */}
                            <div className="flex justify-end mt-[10px] shrink-0">
                                {!g3AnswerRevealed ? (
                                    <button onClick={() => setG3AnswerRevealed(true)} className="liquid-glass-btn px-6 py-2 text-xs font-bold shadow-[0_0_10px_rgba(255,255,255,0.1)]">Voir la réponse</button>
                                ) : (
                                    <button onClick={nextObject} className="bg-[#4A7197] text-white px-6 py-2 rounded-full text-xs font-bold hover:bg-[#4A7197]/80 transition shadow-[0_0_15px_rgba(74,113,151,0.4)]">Objet suivant</button>
                                )}
                            </div>
                        </div>
                    );
                }
                return null;
            };

            const closeGame = () => {
                setIsClosing(true);
                setTimeout(() => {
                    setActiveGame(null);
                    setIsClosing(false);
                }, 200); // Animation de fermeture de 200ms
            };

            useEffect(() => {
                // Empêche le scrolling arrière quand un jeu est ouvert
                if (activeGame && !isClosing) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = '';
                }
                return () => { document.body.style.overflow = ''; };
            }, [activeGame, isClosing]);

            return (
                <div className="fixed inset-0 z-40 bg-[#030508]/90 backdrop-blur-xl animate-[fadeIn_0.5s_ease] flex flex-col p-8 md:p-16">
                    <div className="relative flex justify-center items-center w-full mb-10 shrink-0 h-[50px]">
                        <h2 className="font-title text-2xl md:text-4xl capitalize whitespace-nowrap overflow-hidden text-ellipsis text-center px-4">
                            Ateliers Interactifs : {country.name}
                        </h2>
                        <button onClick={onBack} className="absolute right-[20px] liquid-glass-btn px-4 md:px-6 py-2 text-sm md:text-base font-semibold z-10">
                            ← Quitter les ateliers
                        </button>
                    </div>

                    {/* Grille de sélection des jeux (toujours rendue, statique) */}
                    <div className="flex-grow flex items-center justify-center">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl mx-auto">
                            {[
                                { id: 1, title: "Le Dilemme du Voyageur", desc: "Testez vos réactions face à des situations professionnelles tendues." },
                                { id: 2, title: "Le Détective Culturel", desc: "Devinez le pays à l'aide d'indices visuels et textuels progressifs." },
                                { id: 3, title: "L'Objet Mystère", desc: "Manipulez un artefact 3D et découvrez sa fonction secrète." }
                            ].map(game => (
                                <div key={game.id} onClick={() => setActiveGame(game.id)} className="liquid-glass h-[200px] p-6 flex flex-col justify-center items-center text-center cursor-pointer hover:bg-white/10 hover:scale-105 transition-all duration-300 group">
                                    <div className="w-12 h-12 rounded-full bg-[#4A7197]/20 flex items-center justify-center text-[#4A7197] mb-4 group-hover:bg-[#4A7197] group-hover:text-white transition-colors shrink-0">
                                        <Icons.Gamepad />
                                    </div>
                                    <h3 className="font-title text-xl mb-2 font-bold">{game.title}</h3>
                                    <p className="text-gray-400 text-sm line-clamp-2">{game.desc}</p>
                                </div>
                            ))}
                            {/* Carte Coming soon (totalement statique) */}
                            <div className="liquid-glass h-[200px] p-6 flex flex-col justify-center items-center text-center opacity-50 select-none grayscale" style={{ willChange: 'auto', transform: 'none' }}>
                                <div className="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center text-white mb-4 shrink-0">
                                    <Icons.Lock />
                                </div>
                                <h3 className="font-title text-xl mb-2 font-bold">À venir</h3>
                                <p className="text-gray-400 text-sm line-clamp-2">D'autres jeux arrivent bientôt.</p>
                            </div>
                        </div>
                    </div>

                    {/* Panneau du jeu actif en surcouche (Plein écran) */}
                    {(activeGame || isClosing) && (
                        <div className={`fixed top-0 left-0 w-[100vw] h-[100vh] z-[60] bg-[#030508]/95 backdrop-blur-xl flex items-center justify-center p-4 transition-opacity ${isClosing ? 'duration-200 opacity-0' : 'duration-300 opacity-100'}`}>
                            <div className="relative w-full max-w-4xl mx-auto max-h-[90vh] overflow-y-auto liquid-glass p-8 md:p-12">
                                <button onClick={closeGame} className="absolute top-6 right-6 p-2 rounded-full bg-white/10 hover:bg-white/20 transition z-10">
                                    <Icons.X />
                                </button>
                                {renderGameContent()}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('loading'); // loading, home, transition, 360, games
            const [selectedContinent, setSelectedContinent] = useState(null);
            const [selectedCountry, setSelectedCountry] = useState(null);

            const handleContinentSelect = (continent) => {
                setSelectedContinent(continent);
            };

            const handleCountrySelect = (country) => {
                setSelectedCountry(country);
                setView('transition');
            };

            const goHome = () => {
                setView('home');
                setSelectedContinent(null);
                setSelectedCountry(null);
                if(window.shiftEarth) window.shiftEarth(false);
            };

            return (
                <div className="w-full h-full text-white font-sans">
                    <GalaxyBackground />
                    <Navbar setView={setView} view={view} goHome={goHome} />

                    {view === 'loading' && (
                        <LoadingScreen onComplete={() => setView('home')} />
                    )}

                    {(view === 'home' || view === 'transition' || view === '360') && (
                        <GlobeView onSelectContinent={handleContinentSelect} />
                    )}

                    {view === 'home' && selectedContinent && (
                        <CountryPanel 
                            continent={selectedContinent} 
                            onSelectCountry={handleCountrySelect}
                            onClose={() => setSelectedContinent(null)} 
                        />
                    )}

                    {view === 'transition' && selectedCountry && (
                        <TransitionScreen 
                            country={selectedCountry} 
                            onComplete={() => setView('360')} 
                        />
                    )}

                    {view === '360' && selectedCountry && (
                        <View360 
                            country={selectedCountry}
                            onBack={() => { setView('home'); setSelectedContinent(null); if(window.shiftEarth) window.shiftEarth(false); }}
                            onPlay={() => setView('games')}
                        />
                    )}

                    {view === 'games' && selectedCountry && (
                        <GamesSection 
                            country={selectedCountry}
                            onBack={() => setView('360')}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
